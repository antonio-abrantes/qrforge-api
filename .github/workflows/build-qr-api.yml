# =============================================================================
# QRForge -- Build & Push de Imagem Docker
#
# Trigger 1: push na branch `main`
#            -> publica `latest` + `main-<sha>`
# Trigger 2: push de tag `v*.*.*`
#            -> publica semver + `latest`
#
# Imagem: ghcr.io/<owner>/qrforge:<tag>
# Plataformas: linux/amd64 + linux/arm64
# Deploy: manual -- sete a tag no stack.yml e suba onde quiser
# =============================================================================

name: QRForge -- Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - 'src/**'
      - 'public/**'
      - 'drizzle/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-qr-api.yml'

jobs:
  build-and-push:
    name: Build & Push (qrforge)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (emulacao para cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qrforge
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest
            type=sha,prefix=main-,format=short,enable=${{ startsWith(github.ref, 'refs/heads/') }}

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=qrforge
          cache-to: type=gha,mode=max,scope=qrforge
