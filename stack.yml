version: "3.9"

# DATABASE_URL é totalmente overridable via env do host:
#   - All-in-stack (default): aponta para o serviço qrapi-postgres interno
#   - Postgres externo (VPS/nativo): defina QRAPI_DATABASE_URL (ou DATABASE_URL)
#     no .env do deploy, ex.:
#     QRAPI_DATABASE_URL=postgres://postgres:SENHA@IP_OU_HOST:5432/qrapi
#
# No start do container a API roda migrate automaticamente:
#   1) cria o database do path da URL se não existir (role precisa de CREATEDB)
#   2) aplica schema (tabelas) via drizzle/
# Se a role NÃO tiver CREATEDB: crie o DB vazio uma vez no painel/psql;
# o migrate só aplica as tabelas.
#
# One-shot manual (opcional):
#   docker run --rm -e DATABASE_URL=... -e ADMIN_API_KEY=... imagem node dist/db/migrate.js

services:
  qrapi:
    image: ghcr.io/<seu-usuario>/qrforge:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      # Same password var as qrapi-postgres. Override with full URL only for external Postgres.
      DATABASE_URL: ${QRAPI_DATABASE_URL:-postgres://qrapi:${QRAPI_DB_PASSWORD}@qrapi-postgres:5432/qrapi}
      # Official image with POSTGRES_USER=qrapi does not create a "postgres" database.
      POSTGRES_MAINTENANCE_DB: ${QRAPI_DB_NAME:-qrapi}
      REDIS_URL: ${QRAPI_REDIS_URL:-redis://qrapi-redis:6379}
      ADMIN_API_KEY: ${QRAPI_ADMIN_API_KEY}
      CORS_ORIGIN: ${QRAPI_CORS_ORIGIN:-https://qrapi.tonilabs.space}
      LOG_LEVEL: ${QRAPI_LOG_LEVEL:-info}
    networks:
      - network_public
      - qrapi_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.qrapi.rule=Host(`qrapi.tonilabs.space`)
        - traefik.http.routers.qrapi.entrypoints=websecure
        - traefik.http.routers.qrapi.tls.certresolver=letsencryptresolver
        - traefik.http.services.qrapi.loadbalancer.server.port=3000

  qrapi-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${QRAPI_DB_USER:-qrapi}
      POSTGRES_PASSWORD: ${QRAPI_DB_PASSWORD:?QRAPI_DB_PASSWORD is required}
      POSTGRES_DB: ${QRAPI_DB_NAME:-qrapi}
    networks:
      - qrapi_internal
    volumes:
      - qrapi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  qrapi-redis:
    image: redis:7-alpine
    networks:
      - qrapi_internal
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  network_public:
    external: true
  qrapi_internal:
    driver: overlay
    internal: true

volumes:
  qrapi_pg_data:
